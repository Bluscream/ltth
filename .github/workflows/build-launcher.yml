name: Build Launcher

on:
  workflow_dispatch:
  push:
    tags:
      - 'launcher-v*'

permissions:
  contents: write

jobs:
  build:
    name: Build launcher binaries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '~1.21'

      - name: Build Windows GUI launcher
        working-directory: ./build-src
        run: GOOS=windows GOARCH=amd64 go build -ldflags="-H windowsgui -s -w" -o ../launcher.exe launcher-gui.go

      - name: Build Windows console launcher
        working-directory: ./build-src
        run: GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o ../launcher-console.exe launcher.go

      - name: Build Windows dev launcher
        working-directory: ./build-src
        run: GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o ../dev_launcher.exe dev-launcher.go

      - name: Build Windows thin bootstrapper
        working-directory: ./build-src
        run: GOOS=windows GOARCH=amd64 go build -ldflags="-H windowsgui -s -w" -o ../ltth-bootstrapper.exe bootstrapper.go

      - name: Upload launchers
        uses: actions/upload-artifact@v4
        with:
          name: launchers-windows
          path: |
            launcher.exe
            launcher-console.exe
            dev_launcher.exe
            ltth-bootstrapper.exe

      - name: Create release for launcher tag
        if: startsWith(github.ref, 'refs/tags/launcher-v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            launcher.exe
            launcher-console.exe
            dev_launcher.exe
            ltth-bootstrapper.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
