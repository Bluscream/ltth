      const color = weaponColor(type);
      const direction = Math.atan2(player.vy || 0, player.vx || 1);
      const spin = now / 320;
      const r = point.radius;

      ctx.save();
      ctx.lineWidth = Math.max(2, r * 0.1);
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.shadowColor = color;
      ctx.shadowBlur = renderStats.quality > 0.78 && state.players.length <= 55 ? 8 : 0;

      if (type === 'chainsaw') {
        drawChainsawTeeth(point, r, now, color);
        ctx.beginPath();
        ctx.arc(point.x, point.y, r * (1.52 + Math.sin(now / 90) * 0.04), 0, Math.PI * 2);
        ctx.stroke();
      } else if (type === 'freeze') {
        for (let i = 0; i < 5; i++) {
          const angle = spin + i * Math.PI * 0.4;
          ctx.beginPath();
          ctx.moveTo(point.x + Math.cos(angle) * r * 0.72, point.y + Math.sin(angle) * r * 0.72);
          ctx.lineTo(point.x + Math.cos(angle) * r * 1.22, point.y + Math.sin(angle) * r * 1.22);
          ctx.stroke();
        }
      } else if (type === 'dash') {
        const back = direction + Math.PI;
        ctx.globalAlpha = 0.9;
        for (const offset of [-0.26, 0.26]) {
          ctx.beginPath();
          ctx.moveTo(point.x + Math.cos(back + offset) * r * 0.85, point.y + Math.sin(back + offset) * r * 0.85);
          ctx.lineTo(point.x + Math.cos(back + offset) * r * 1.45, point.y + Math.sin(back + offset) * r * 1.45);
          ctx.stroke();
        }
      } else if (type === 'magnet') {
        ctx.beginPath();
        ctx.arc(point.x - r * 0.24, point.y, r * 0.48, Math.PI * 0.45, Math.PI * 1.55);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(point.x + r * 0.24, point.y, r * 0.48, -Math.PI * 0.55, Math.PI * 0.55);
        ctx.stroke();
      } else if (type === 'vampire') {
        ctx.beginPath();
        ctx.moveTo(point.x - r * 0.2, point.y + r * 0.9);
        ctx.lineTo(point.x, point.y + r * 1.3);
        ctx.lineTo(point.x + r * 0.2, point.y + r * 0.9);
        ctx.stroke();
      } else if (type === 'mine') {
        ctx.beginPath();
        ctx.arc(point.x + Math.cos(spin) * r * 1.02, point.y + Math.sin(spin) * r * 1.02, Math.max(3, r * 0.16), 0, Math.PI * 2);
        ctx.fill();
      } else if (type === 'speed') {
        const back = direction + Math.PI;
        for (const offset of [-0.42, 0.42]) {
          const x = point.x + Math.cos(back + offset) * r * 0.82;
          const y = point.y + Math.sin(back + offset) * r * 0.82;
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.lineTo(x + Math.cos(back) * r * 0.78, y + Math.sin(back) * r * 0.78);
          ctx.stroke();
        }
      } else if (type === 'laser') {
        const muzzleX = point.x + Math.cos(direction) * r * 0.98;
        const muzzleY = point.y + Math.sin(direction) * r * 0.98;
        ctx.translate(muzzleX, muzzleY);
        ctx.rotate(direction);
        ctx.fillRect(-r * 0.12, -r * 0.18, r * 0.7, r * 0.36);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(r * 0.42, -r * 0.08, r * 0.22, r * 0.16);
      } else if (type === 'missile') {
        const angle = direction + Math.sin(now / 180) * 0.16;
        ctx.translate(point.x + Math.cos(angle) * r * 1.03, point.y + Math.sin(angle) * r * 1.03);
        ctx.rotate(angle);
        ctx.beginPath();
        ctx.moveTo(r * 0.55, 0);
        ctx.lineTo(-r * 0.38, -r * 0.26);
        ctx.lineTo(-r * 0.18, 0);
        ctx.lineTo(-r * 0.38, r * 0.26);
        ctx.closePath();
        ctx.fill();
      } else if (type === 'shield') {
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const angle = spin * 0.18 + i * Math.PI / 3;
          const x = point.x + Math.cos(angle) * r * 1.08;
          const y = point.y + Math.sin(angle) * r * 1.08;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.stroke();
      } else if (type === 'pulse') {
        ctx.globalAlpha = 0.92;
        ctx.beginPath();
        ctx.arc(point.x, point.y, r * (1.22 + Math.sin(now / 170) * 0.08), 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 0.48;
        ctx.beginPath();
        ctx.arc(point.x, point.y, r * 1.52, 0, Math.PI * 2);
        ctx.stroke();
      } else if (type === 'blackhole') {
        for (const offset of [0, Math.PI * 0.62, Math.PI * 1.22]) {
          const angle = spin * 0.7 + offset;
          ctx.beginPath();
          ctx.arc(point.x, point.y, r * 1.28, angle, angle + Math.PI * 0.72);
          ctx.stroke();
        }
      } else {
        ctx.beginPath();
        ctx.arc(point.x, point.y, r * 1.12, 0, Math.PI * 2);
        ctx.stroke();
      }

      ctx.restore();
    }

    function easeOutCubic(value) {
      return 1 - Math.pow(1 - value, 3);
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function reconcilePlayers(players) {
      const now = performance.now();
      const keep = new Set();

      (players || []).forEach(player => {
        keep.add(player.username);
        const existing = viewPlayers.get(player.username);
        if (!existing) {
          viewPlayers.set(player.username, {
            player,
            prevX: player.x,
            prevY: player.y,
            prevRadius: player.radius,
            targetX: player.x,
            targetY: player.y,
            targetRadius: player.radius,
            renderX: player.x,
            renderY: player.y,
            renderRadius: player.radius,
            serverVx: 0,
            serverVy: 0,
            updatedAt: now
          });
          return;
        }

        const elapsedSeconds = Math.max(0.016, (now - existing.updatedAt) / 1000);
        const nextServerVx = (player.x - existing.targetX) / elapsedSeconds;
        const nextServerVy = (player.y - existing.targetY) / elapsedSeconds;
        existing.player = player;
        existing.prevX = existing.renderX;
        existing.prevY = existing.renderY;
        existing.prevRadius = existing.renderRadius;
        existing.targetX = player.x;
        existing.targetY = player.y;
        existing.targetRadius = player.radius;
        existing.serverVx = clampNumber(nextServerVx, -1800, 1800, 0);
        existing.serverVy = clampNumber(nextServerVy, -1800, 1800, 0);
        existing.updatedAt = now;
      });

      for (const username of viewPlayers.keys()) {
        if (!keep.has(username)) {
          viewPlayers.delete(username);
          trailHistory.delete(username);
        }
      }
    }

    function interpolatedPlayer(view, now) {
      const interval = getInterpolationInterval();
      const elapsed = Math.max(0, now - view.updatedAt);
      const t = Math.min(1, elapsed / interval);
      const extrapolationSeconds = Math.max(0, Math.min(SMOOTHING_EXTRAPOLATION_MS, elapsed - interval)) / 1000;
      const extrapolationWeight = 0.72;
      const estimatedX = lerp(view.prevX, view.targetX, t) + (view.serverVx || 0) * extrapolationSeconds * extrapolationWeight;
      const estimatedY = lerp(view.prevY, view.targetY, t) + (view.serverVy || 0) * extrapolationSeconds * extrapolationWeight;
      const arenaWidth = state.config?.arenaWidth || 1920;
      const arenaHeight = state.config?.arenaHeight || 1080;
      view.renderRadius = lerp(view.prevRadius, view.targetRadius, easeOutCubic(t));
      view.renderX = clampNumber(estimatedX, view.renderRadius, arenaWidth - view.renderRadius, view.targetX);
      view.renderY = clampNumber(estimatedY, view.renderRadius, arenaHeight - view.renderRadius, view.targetY);
      return Object.assign({}, view.player, {
        x: view.renderX,
        y: view.renderY,
        radius: view.renderRadius
      });
    }

    function updateTrail(player, point) {
      if (renderStats.quality < 0.7 || state.players.length > 70) return;
      const maxTrail = renderStats.quality > 0.88 ? 7 : 4;
      const history = trailHistory.get(player.username) || [];
      const last = history[history.length - 1];
      if (!last || Math.hypot(last.x - point.x, last.y - point.y) > Math.max(4, point.radius * 0.18)) {
        history.push({
          x: point.x,
          y: point.y,
          radius: point.radius,
          hue: hueFromColor(player.color)
        });
      }
      while (history.length > maxTrail) history.shift();
      trailHistory.set(player.username, history);
    }

    function drawTrails(players) {
      if (renderStats.quality < 0.7 || players.length > 70) return;
      ctx.save();
      for (const player of players) {
        const history = trailHistory.get(player.username) || [];
        const hue = hueFromColor(player.color);
        for (let i = 0; i < history.length; i++) {
          const item = history[i];
          const alpha = (i + 1) / history.length;
          ctx.fillStyle = hsla(item.hue || hue, 90, 62, 0.045 * alpha);
          ctx.beginPath();
          ctx.arc(item.x, item.y, item.radius * (0.62 + alpha * 0.18), 0, Math.PI * 2);
          ctx.fill();
        }
      }
      ctx.restore();
    }

    function drawPlayer(player, now) {
      const point = project(player);
      const visualAlpha = playerVisualAlpha(player);
      const readableAlpha = Math.max(visualAlpha, 0.58);
      updateTrail(player, point);
      drawWeapon(player, point, now, visualAlpha);

      ctx.save();
      ctx.globalAlpha = visualAlpha;
      const hasAvatar = drawAvatarImage(player, point);
      if (!hasAvatar) {
        drawFallbackOrb(player, point);
      }
      ctx.restore();

      ctx.save();
      ctx.globalAlpha = readableAlpha;
      drawAvatarChrome(player, point, hasAvatar);
      drawAnimatedWeaponAttachment(player, point, now);

      if (!hasAvatar) {
        const initials = (player.nickname || player.username || '?').trim().slice(0, 2).toUpperCase();
        ctx.fillStyle = '#ffffff';
        ctx.font = `700 ${Math.max(10, Math.min(18, point.radius * 0.58))}px Segoe UI, Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(initials, point.x, point.y);
      }
      ctx.restore();

      const shouldLabel = renderStats.quality > 0.74 && point.radius >= 15 && (state.players.length <= 28 || player.mass >= 34);
      if (shouldLabel) {
        ctx.font = `600 ${Math.max(10, Math.min(15, point.radius * 0.38))}px Segoe UI, Arial`;
        ctx.textBaseline = 'top';
        ctx.fillStyle = '#e2e8f0';
        ctx.strokeStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.lineWidth = 3;
        const name = clampText(player.nickname || player.username, player.username, 18);
        ctx.strokeText(name, point.x, point.y + point.radius + 4);
        ctx.fillText(name, point.x, point.y + point.radius + 4);
      }
    }

    function pushEffect(effect) {
      effects.push(effect);
      if (effects.length > 90) {
        effects.splice(0, effects.length - 90);
      }
    }

    function drawEatingEffect(effect, progress, now) {
      const point = project(effect);
      const eased = easeOutCubic(progress);
      const radius = Math.max(5, point.radius * (1 + eased * 2.2));
      const hue = effect.reason === 'blackhole' ? 25 : effect.reason === 'pulse' ? 280 : 176;

      ctx.save();
      ctx.globalAlpha = (1 - progress) * 0.7;
      ctx.strokeStyle = hsla(hue, 92, 65, 0.9);
      ctx.lineWidth = Math.max(1.4, point.radius * 0.24);
      ctx.beginPath();
      ctx.arc(point.x, point.y, radius, 0, Math.PI * 2);
      ctx.stroke();

      if (renderStats.quality > 0.64) {
        ctx.fillStyle = hsla(hue, 96, 70, 0.75);
        for (let i = 0; i < 4; i++) {
          const angle = now / 160 + i * Math.PI * 0.5;
          const sparkRadius = radius * 0.48 + i * 1.5;
          ctx.beginPath();
          ctx.arc(
            point.x + Math.cos(angle) * sparkRadius,
            point.y + Math.sin(angle) * sparkRadius,
            Math.max(1.5, point.radius * 0.18 * (1 - progress)),
            0,
            Math.PI * 2
          );
          ctx.fill();
        }
      }
      ctx.restore();
    }

    function drawChainsawHitEffect(effect, progress, now) {
      const point = project(effect);
      const color = weaponColor('chainsaw');
      const radius = Math.max(10, point.radius * (1.1 + progress * 2.6));
      const spin = now / 58;
      const chainsaw_sparks = effect.mode === 'bounce' ? 16 : 24;

      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.globalAlpha = (1 - progress) * 0.9;
      ctx.lineWidth = Math.max(2, point.radius * 0.18);

      for (let i = 0; i < 3; i++) {
        const angle = spin + i * Math.PI / 3;
        const length = radius * (0.75 + i * 0.22);
        ctx.beginPath();
        ctx.moveTo(point.x - Math.cos(angle) * length, point.y - Math.sin(angle) * length);
        ctx.lineTo(point.x + Math.cos(angle) * length, point.y + Math.sin(angle) * length);
        ctx.stroke();
      }

      ctx.lineWidth = Math.max(1, point.radius * 0.07);
      ctx.beginPath();
      ctx.arc(point.x, point.y, radius, 0, Math.PI * 2);
      ctx.stroke();

      for (let i = 0; i < chainsaw_sparks; i++) {
        const angle = spin * 1.7 + i * Math.PI * 2 / chainsaw_sparks;
        const distance = radius * (0.35 + (i % 5) * 0.14 + progress * 0.7);
        const size = Math.max(1.4, point.radius * 0.1 * (1 - progress));
        ctx.beginPath();
        ctx.arc(
          point.x + Math.cos(angle) * distance,
          point.y + Math.sin(angle) * distance,
          size,
          0,
          Math.PI * 2
        );
        ctx.fill();
      }

      ctx.restore();
    }

    function drawEffects(now) {
      for (let i = effects.length - 1; i >= 0; i--) {
        const effect = effects[i];
        const progress = (Date.now() - effect.startedAt) / effect.duration;
        if (progress >= 1) {
          effects.splice(i, 1);
          continue;
        }

        if (effect.type === 'eat') {
          drawEatingEffect(effect, progress, now);
          continue;
        }
        if (effect.type === 'chainsaw-hit') {
          drawChainsawHitEffect(effect, progress, now);
          continue;
        }

        const point = project(effect);
        ctx.beginPath();
        ctx.strokeStyle = effect.color;
        ctx.globalAlpha = (1 - progress) * 0.42;
        ctx.lineWidth = 3;
        ctx.arc(point.x, point.y, effect.radius * (1 + progress * 3), 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
    }

    function updateQuality(now) {
      const frameMs = now - renderStats.lastFrameAt;
      renderStats.lastFrameAt = now;
      renderStats.frameCount += 1;
      updateRendererStats();
      if (frameMs > 0 && frameMs < 250) {
        renderStats.avgFrameMs = renderStats.avgFrameMs * 0.92 + frameMs * 0.08;
        renderStats.fps = Math.round((1000 / renderStats.avgFrameMs) * 10) / 10;
      }

      if (renderStats.frameCount % 24 !== 0) return;

      const targetFrameMs = 1000 / getTargetFps();
      if (renderStats.avgFrameMs > targetFrameMs * 1.8) {
        renderStats.quality = Math.max(0.5, renderStats.quality - 0.15);
      } else if (renderStats.avgFrameMs > targetFrameMs * 1.35) {
        renderStats.quality = Math.max(0.65, renderStats.quality - 0.08);
      } else if (renderStats.avgFrameMs < targetFrameMs * 1.12) {
        renderStats.quality = Math.min(1, renderStats.quality + 0.06);
      }
    }

    function draw(now = performance.now()) {
      requestAnimationFrame(draw);
      const targetFrameMs = 1000 / getTargetFps();
      if (lastDrawAt && now - lastDrawAt < targetFrameMs - 0.5) {
        renderStats.skippedFrames += 1;
        return;
      }
      lastDrawAt = now;
      updateQuality(now);
      const renderLimit = getMaxRenderPlayers();
      const players = Array.from(viewPlayers.values())
        .map(view => interpolatedPlayer(view, now))
        .sort((a, b) => a.radius - b.radius)
        .slice(-renderLimit);
      renderStats.visiblePlayers = players.length;
      if (!renderEngine) {
        renderEngine = new CanvasArenaRenderer();
      }
      renderEngine.render(now, players);
      updateInfoRotator(now);
    }

    function applyState(nextState) {
      const previousRenderScale = getRenderScale();
      state = Object.assign({}, state, nextState || {});
      if (nextState && Array.isArray(nextState.players)) {
        reconcilePlayers(nextState.players);
      }
      updateRendererStats();
      if (previousRenderScale !== getRenderScale()) {
        resize();
      }
      updateHud();
    }

    socket.on('arena:state', applyState);
    socket.on('arena:player-removed', data => {
      if (!data?.username) return;
      viewPlayers.delete(data.username);
      trailHistory.delete(data.username);
      state.players = (state.players || []).filter(player => player.username !== data.username);
      updateHud();
    });
    socket.on('arena:player-absorbed', data => {
      if (!data) return;
      const prey = (state.players || []).find(player => player.username === data.prey);
      const predator = (state.players || []).find(player => player.username === data.predator);
      const x = Number(data.x) || Number(prey?.x) || Number(predator?.x) || 0;
      const y = Number(data.y) || Number(prey?.y) || Number(predator?.y) || 0;
      const radius = Math.max(10, Number(data.radius) || Number(prey?.radius) || Number(predator?.radius) * 0.55 || 18);
      pushEffect({
        type: 'eat',
        x,
        y,
        radius,
        gain: Number(data.massGain) || Number(data.lifeGain) || 1,
        reason: 'absorbed',
        startedAt: Date.now(),
        duration: data.weaponType ? 620 : 520
      });
    });
    socket.on('arena:weapon-activated', data => {
      const player = (state.players || []).find(p => p.username === data.username);
      if (!player) return;
      pushEffect({
        x: player.x,
        y: player.y,
        radius: player.radius,
        color: weaponColor(data.weapon?.type),
        startedAt: Date.now(),
        duration: 620
      });
    });
    socket.on('arena:weapon-collected', data => {
      const player = (state.players || []).find(p => p.username === data.username);
      if (!player) return;
      pushEffect({
        x: player.x,
        y: player.y,
        radius: player.radius * 1.1,
        color: weaponColor(data.weapon?.type),
        startedAt: Date.now(),
        duration: 520
      });
    });
    socket.on('arena:food-eaten', data => {
      if (!data) return;
      pushEffect({
        type: 'eat',
        x: Number(data.x) || 0,
        y: Number(data.y) || 0,
        radius: Math.max(4, Number(data.radius) || 5),
        gain: Number(data.gain) || 1,
        reason: data.reason || 'food',
        startedAt: Date.now(),
        duration: data.reason === 'blackhole' ? 520 : 380
      });
    });
    socket.on('arena:chainsaw-hit', data => {
      if (!data) return;
      pushEffect({
        type: 'chainsaw-hit',
        mode: data.mode || 'slice',
        x: Number(data.x) || 0,
        y: Number(data.y) || 0,
        radius: Math.max(12, Number(data.radius) || 28),
        color: weaponColor('chainsaw'),
        startedAt: Date.now(),
        duration: data.mode === 'bounce' ? 620 : 760
      });
    });
    socket.on('arena:mine-triggered', data => {
      if (!data) return;
      pushEffect({
        x: Number(data.x) || 0,
        y: Number(data.y) || 0,
        radius: Math.max(12, Number(data.radius) || 40),
        color: weaponColor('mine'),
        startedAt: Date.now(),
        duration: 520
      });
    });

    socket.on('game-engine:config-updated', data => {
      if (data.gameType !== 'arena') return;
      applyState({
        config: Object.assign({}, state.config, data.config || {})
      });
    });
    socket.on('gift-catalog:updated', () => {
      giftCatalogLoaded = false;
      loadArenaGiftCatalogImages(true).then(() => updateInfoRotator());
    });

    if (infoRotatorIcon && infoRotatorIconText) {
      infoRotatorIcon.addEventListener('error', () => {
        const failedUrl = infoRotatorIcon.getAttribute('src');
        if (failedUrl) {
          failedInfoImageUrls.add(failedUrl);
        }
        infoRotatorIcon.hidden = true;
        infoRotatorIcon.removeAttribute('src');
        infoRotatorIconText.hidden = false;
      });
    }

    fetch('/api/game-engine/arena/state')
      .then(response => response.ok ? response.json() : null)
      .then(data => {
        if (data) applyState(data);
      })
      .catch(() => {});
    loadArenaGiftCatalogImages().then(() => updateInfoRotator());

    window.addEventListener('resize', resize);
    renderEngine = new CanvasArenaRenderer();
    loadArenaRenderEngine().then(engine => {
      if (engine) {
        if (renderEngine && renderEngine.type !== 'canvas2d' && typeof renderEngine.destroy === 'function') {
          renderEngine.destroy();
        }
        renderEngine = engine;
        renderEngine.resize();
        updateRendererStats();
      }
    });
    resize();
    updateHud();
    draw();
  </script>
</body>
</html>
