<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Control Overlay</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent !important;
      background-color: transparent !important;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #weather-container,
    #weather-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: transparent !important;
      background-color: transparent !important;
      pointer-events: none;
    }

    #weather-canvas {
      display: block;
      will-change: transform;
      transform: translate3d(0, 0, 0);
      backface-visibility: hidden;
    }

    #lightning-flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: white;
      opacity: 0;
      z-index: 9998;
      transition: opacity 120ms ease-out;
    }

    #debug-info,
    #connection-status {
      position: fixed;
      z-index: 10000;
      display: none;
      font: 12px/1.45 "Cascadia Mono", Consolas, monospace;
      color: #b5f5c8;
      background: rgba(0, 0, 0, 0.78);
      border: 1px solid rgba(181, 245, 200, 0.35);
      border-radius: 8px;
      padding: 10px 12px;
    }

    #debug-info {
      top: 10px;
      left: 10px;
      min-width: 260px;
    }

    #connection-status {
      right: 10px;
      bottom: 10px;
      color: #fff;
      border-color: transparent;
    }

    #gamification-hud {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 10001;
      width: min(360px, calc(100vw - 24px));
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(10, 14, 24, 0.68);
      color: #fff;
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
      display: none;
      pointer-events: none;
    }

    #gamification-hud.show {
      display: block;
    }

    #gamification-hud .gamification-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      font: 600 13px/1.2 system-ui, sans-serif;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    #gamification-hud .gamification-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
      font: 12px/1.3 system-ui, sans-serif;
      color: rgba(255, 255, 255, 0.9);
    }

    #gamification-hud .gamification-meter {
      height: 10px;
      width: 100%;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.12);
      margin-top: 6px;
    }

    #gamification-hud .gamification-meter-fill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, #7dd3fc, #818cf8, #f472b6);
      transition: width 180ms ease-out;
    }

    #gamification-hud .gamification-pill {
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 11px;
      white-space: nowrap;
    }

    #debug-info.active,
    #connection-status.show {
      display: block;
    }

    #connection-status.connected {
      background: rgba(22, 101, 52, 0.84);
    }

    #connection-status.disconnected {
      background: rgba(153, 27, 27, 0.84);
    }

    #connection-status.reconnecting {
      background: rgba(146, 64, 14, 0.84);
    }
  </style>
</head>
<body>
  <div id="weather-container">
    <canvas id="weather-canvas"></canvas>
  </div>
  <div id="lightning-flash"></div>
  <div id="debug-info"></div>
  <div id="connection-status"></div>
  <div id="gamification-hud" aria-live="polite">
    <div class="gamification-title">
      <span>Community Weather</span>
      <span class="gamification-pill" id="gamification-next-reward">-</span>
    </div>
    <div>
      <div class="gamification-row">
        <span id="gamification-quest-title">Quest</span>
        <span class="gamification-pill" id="gamification-quest-progress">0/0</span>
      </div>
      <div class="gamification-row">
        <span id="gamification-streak-title">Streak</span>
        <span class="gamification-pill" id="gamification-streak-value">0</span>
      </div>
      <div class="gamification-meter" aria-hidden="true">
        <div class="gamification-meter-fill" id="gamification-meter-fill"></div>
      </div>
      <div class="gamification-row" style="margin-top: 6px;">
        <span id="gamification-meter-label">Meter</span>
        <span class="gamification-pill" id="gamification-meter-value">0/100</span>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/plugins/weather-control/weather-engine.js"></script>
  <script>
    (function() {
      'use strict';

      const SUPPORTED_EFFECTS = [
        'rain',
        'snow',
        'storm',
        'fog',
        'thunder',
        'sunbeam',
        'glitchclouds',
        'aurora',
        'fireflies',
        'meteors',
        'sakura',
        'embers',
        'heatwave'
      ];

      const query = new URLSearchParams(window.location.search);
      const debug = query.get('debug') === 'true';
      const forcedQuality = query.get('quality');
      const canvas = document.getElementById('weather-canvas');
      const debugInfo = document.getElementById('debug-info');
      const connectionStatus = document.getElementById('connection-status');
      const lightningFlash = document.getElementById('lightning-flash');

      let socket = null;
      let engine = null;
      let config = null;
      let effectQueue = [];
      let totalEventsReceived = 0;
      let audioContext = null;
      let stateBroadcastTimer = null;
      let gamificationState = null;

      function log(message) {
        if (debug) {
          console.debug('[Weather Overlay]', message);
        }
      }

      function updateConnectionStatus(status, message) {
        connectionStatus.className = '';
        connectionStatus.classList.add(status, 'show');
        connectionStatus.textContent = message;
        if (status === 'connected' && !debug) {
          setTimeout(() => connectionStatus.classList.remove('show'), 2500);
        }
      }

      async function fetchConfig() {
        try {
          const response = await fetch('/api/weather/config', { cache: 'no-store' });
          const data = await response.json();
          if (data.success) {
            config = data.config;
          }
        } catch (error) {
          log(`Config load failed: ${error.message}`);
        }

        config = config || {};
        config.effects = config.effects || {};
        config.audio = config.audio || { enabled: false, volume: 0.45, effects: {} };
        config.maxConcurrentEffects = Math.max(1, Math.min(12, parseInt(config.maxConcurrentEffects) || 5));
        config.qualityPreset = forcedQuality || config.qualityPreset || 'high';
        config.adaptiveQuality = config.adaptiveQuality !== false;
        config.gamification = config.gamification || {};
        config.gamification.overlay = config.gamification.overlay || {};
      }

      function shouldShowGamificationHud() {
        return config?.gamification?.enabled !== false &&
          config?.gamification?.overlay?.enabled !== false &&
          (config?.gamification?.overlay?.showMeter !== false ||
            config?.gamification?.overlay?.showQuest !== false ||
            config?.gamification?.overlay?.showStreak !== false ||
            config?.gamification?.overlay?.showRewardFeed !== false);
      }

      function updateGamificationHud(state = null) {
        gamificationState = state || gamificationState || {};
        const hud = document.getElementById('gamification-hud');
        const meter = gamificationState?.communityMeter || {};
        const quest = gamificationState?.quest || null;
        const streaks = gamificationState?.streaks || {};
        const rewards = gamificationState?.rewards || {};

        if (!hud) return;
        hud.classList.toggle('show', shouldShowGamificationHud());

        const meterValue = document.getElementById('gamification-meter-value');
        const meterFill = document.getElementById('gamification-meter-fill');
        const questTitle = document.getElementById('gamification-quest-title');
        const questProgress = document.getElementById('gamification-quest-progress');
        const streakValue = document.getElementById('gamification-streak-value');
        const nextReward = document.getElementById('gamification-next-reward');
        const meterLabel = document.getElementById('gamification-meter-label');
        const streakTitle = document.getElementById('gamification-streak-title');

        if (meterValue) {
          meterValue.textContent = `${meter.current ?? 0}/${meter.max ?? 100}`;
        }
        if (meterFill) {
          const max = Math.max(1, meter.max || 100);
          meterFill.style.width = `${Math.min(100, ((meter.current || 0) / max) * 100)}%`;
        }
        if (questTitle) {
          questTitle.textContent = quest?.title || 'Quest';
        }
        if (questProgress) {
          questProgress.textContent = quest ? `${quest.progress ?? 0}/${quest.target ?? 0}` : '0/0';
        }
        if (streakValue) {
          streakValue.textContent = String(streaks.current ?? 0);
        }
        if (nextReward) {
          nextReward.textContent = rewards.nextThreshold ? `${rewards.nextThreshold.label || 'Reward'} @ ${rewards.nextThreshold.meter}` : '-';
        }
        if (meterLabel && config?.gamification?.overlay?.showMeter === false) {
          meterLabel.textContent = 'Meter disabled';
        }
        if (streakTitle && config?.gamification?.overlay?.showStreak === false) {
          streakTitle.textContent = 'Streak disabled';
        }
      }

      function initEngine() {
        if (!window.WeatherEngine) {
          throw new Error('WeatherEngine is not loaded');
        }

        engine = new window.WeatherEngine(canvas, {
          debug,
          renderQuality: config.qualityPreset,
          adaptiveQuality: config.adaptiveQuality,
          enablePostProcessing: query.get('bloom') === 'true',
          onLightning: flashLightning,
          onQualityChange: (quality, avgFps) => {
            log(`Adaptive quality changed to ${quality} at ${avgFps} FPS`);
          }
        });

        engine.start();
        window.addEventListener('resize', () => engine.updateDimensions());
      }

      function flashLightning(intensity) {
        lightningFlash.style.opacity = String(Math.min(0.85, 0.25 + intensity * 0.55));
        setTimeout(() => {
          lightningFlash.style.opacity = '0';
        }, 90);
      }

      function getEffectOptions(action, eventOptions) {
        const effectConfig = config.effects?.[action] || {};
        return {
          layer: effectConfig.layer,
          opacity: effectConfig.opacity,
          particleScale: effectConfig.particleScale,
          wind: effectConfig.wind,
          directionDeg: effectConfig.directionDeg,
          fogColor: effectConfig.fogColor,
          colorTemperature: effectConfig.colorTemperature,
          ...(eventOptions || {})
        };
      }

      function getAudioContext() {
        if (!audioContext) {
          const AudioCtor = window.AudioContext || window.webkitAudioContext;
          if (!AudioCtor) return null;
          audioContext = new AudioCtor();
        }
        if (audioContext.state === 'suspended') {
          audioContext.resume().catch(() => {});
        }
        return audioContext;
      }

      function playTone(ctx, frequency, duration, volume, type) {
        const oscillator = ctx.createOscillator();
        const gain = ctx.createGain();
        oscillator.type = type || 'sine';
        oscillator.frequency.value = frequency;
        gain.gain.setValueAtTime(0.0001, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(Math.max(0.0001, volume), ctx.currentTime + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
        oscillator.connect(gain);
        gain.connect(ctx.destination);
        oscillator.start();
        oscillator.stop(ctx.currentTime + duration + 0.02);
      }

      function playWeatherAudio(action, intensity) {
        if (!config.audio?.enabled) return;
        const effectAudio = config.audio.effects?.[action] || {};
        if (effectAudio.enabled === false) return;

        const ctx = getAudioContext();
        if (!ctx) return;

        const volume = Math.max(0, Math.min(1, (config.audio.volume ?? 0.45) * (effectAudio.volume ?? 1) * intensity));
        if (action === 'thunder' || action === 'storm') {
          playTone(ctx, 72, 0.45, volume * 0.85, 'sawtooth');
          playTone(ctx, 44, 0.8, volume * 0.55, 'triangle');
        } else if (action === 'rain') {
          playTone(ctx, 180, 0.9, volume * 0.22, 'triangle');
        } else if (action === 'embers' || action === 'heatwave') {
          playTone(ctx, 96, 0.75, volume * 0.25, 'sine');
        }
      }

      function triggerEffectImmediately(data) {
        if (!engine || !data?.action || !SUPPORTED_EFFECTS.includes(data.action)) return;

        const action = data.action;
        const isPermanent = data.permanent === true || data.duration === 0 || data.duration === '0';
        const intensity = Math.max(0, Math.min(1, parseFloat(data.intensity) || config.effects?.[action]?.defaultIntensity || 0.5));
        const duration = isPermanent ? 0 : Math.max(1000, Math.min(60000, parseInt(data.duration) || config.effects?.[action]?.defaultDuration || 10000));
        const options = getEffectOptions(action, data.options);

        if (isPermanent) {
          engine.stopEffect(action);
        }

        engine.startEffect(action, intensity, duration, {
          ...options,
          permanent: isPermanent
        });
        playWeatherAudio(action, intensity);
        broadcastState();
      }

      function handleWeatherEvent(data) {
        if (!data?.action || !SUPPORTED_EFFECTS.includes(data.action)) return;
        const isPermanent = data.permanent === true || data.duration === 0 || data.duration === '0';

        if (isPermanent || engine.getActiveEffects().length < config.maxConcurrentEffects) {
          triggerEffectImmediately(data);
          return;
        }

        if (effectQueue.length < 20) {
          effectQueue.push(data);
        }
      }

      function processQueue() {
        if (!engine) return;
        while (effectQueue.length && engine.getActiveEffects().length < config.maxConcurrentEffects) {
          triggerEffectImmediately(effectQueue.shift());
        }
      }

      function stopAllEffects() {
        effectQueue = [];
        if (engine) {
          engine.stopAllEffects();
        }
        broadcastState();
      }

      function stopEffect(action) {
        effectQueue = effectQueue.filter(event => event.action !== action);
        if (engine && SUPPORTED_EFFECTS.includes(action)) {
          engine.stopEffect(action);
        }
        broadcastState();
      }

      function broadcastState() {
        if (!socket || !engine) return;
        socket.emit('weather:overlay-state', {
          activeEffects: engine.getActiveEffects().map(effect => ({
            type: effect.type,
            intensity: effect.intensity,
            permanent: effect.permanent === true,
            duration: effect.duration,
            startedAt: effect.startTime,
            layer: effect.layer
          })),
          fps: engine.getFPS(),
          particles: engine.getParticleCount(),
          quality: engine.options.renderQuality
        });
      }

      function updateDebugInfo() {
        if (!debug || !engine) return;
        debugInfo.classList.add('active');
        const activeEffects = engine.getActiveEffects();
        debugInfo.innerHTML = [
          '<strong>Weather Control Debug</strong>',
          `Socket: ${socket && socket.connected ? 'connected' : 'disconnected'}`,
          `FPS: ${engine.getFPS()} / avg ${engine.getAverageFPS()}`,
          `Quality: ${engine.options.renderQuality}`,
          `Particles: ${engine.getParticleCount()}`,
          `Active: ${activeEffects.map(effect => effect.type).join(', ') || '-'}`,
          `Queue: ${effectQueue.length}`,
          `Events: ${totalEventsReceived}`
        ].join('<br>');
      }

      async function fetchGamificationState() {
        try {
          const response = await fetch('/api/weather/gamification', { cache: 'no-store' });
          const data = await response.json();
          if (data.success && data.gamification) {
            updateGamificationHud(data.gamification);
          } else {
            updateGamificationHud(null);
          }
        } catch (error) {
          log(`Gamification state load failed: ${error.message}`);
        }
      }

      function initSocket() {
        socket = io({
          transports: ['websocket', 'polling'],
          reconnection: true,
          reconnectionDelay: 1000,
          reconnectionDelayMax: 30000,
          reconnectionAttempts: Infinity,
          timeout: 20000
        });

        socket.on('connect', () => {
          updateConnectionStatus('connected', 'Connected');
          socket.emit('weather:client-ready');
          socket.emit('weather:request-gamification-state');
          broadcastState();
        });

        socket.on('disconnect', () => updateConnectionStatus('disconnected', 'Disconnected'));
        socket.on('reconnect_attempt', (attempt) => updateConnectionStatus('reconnecting', `Reconnecting ${attempt}`));
        socket.on('reconnect', () => {
          updateConnectionStatus('connected', 'Reconnected');
          socket.emit('weather:client-ready');
          socket.emit('weather:request-gamification-state');
        });

        socket.on('weather:trigger', (data) => {
          totalEventsReceived++;
          handleWeatherEvent(data);
        });
        socket.on('weather:stop', stopAllEffects);
        socket.on('weather:stop-effect', (data) => {
          if (data?.action) stopEffect(data.action);
        });
        socket.on('weather:gamification-state', (payload) => {
          updateGamificationHud(payload?.gamification || payload || {});
        });
        socket.on('weather:config-changed', async () => {
          await fetchConfig();
          if (engine) {
            engine.setQuality(config.qualityPreset, config.adaptiveQuality);
          }
          await fetchGamificationState();
          stopAllEffects();
          setTimeout(() => socket.emit('weather:request-permanent-effects'), 100);
        });
      }

      async function init() {
        await fetchConfig();
        initEngine();
        initSocket();
        await fetchGamificationState();
        updateConnectionStatus('reconnecting', 'Connecting');

        setInterval(processQueue, 250);
        setInterval(updateDebugInfo, 250);
        stateBroadcastTimer = setInterval(broadcastState, 1000);

        if (debug) {
          const ctx = canvas.getContext('2d', { alpha: true });
          const pixel = ctx.getImageData(0, 0, 1, 1).data;
          log(`Initial alpha: ${pixel[3]}`);
        }
      }

      function cleanup() {
        if (stateBroadcastTimer) clearInterval(stateBroadcastTimer);
        if (socket) socket.disconnect();
        if (engine) engine.destroy();
      }

      window.addEventListener('load', () => {
        init().catch((error) => {
          console.error('[Weather Overlay] Failed to initialize', error);
          updateConnectionStatus('disconnected', `Init failed: ${error.message}`);
        });
      });
      window.addEventListener('beforeunload', cleanup);

      if (debug) {
        window.weatherControl = {
          triggerEffect: (action, intensity, duration, options) => handleWeatherEvent({ action, intensity, duration, options }),
          stopEffect,
          stopAllEffects,
          getStats: () => ({
            fps: engine?.getFPS() || 0,
            avgFps: engine?.getAverageFPS() || 0,
            particles: engine?.getParticleCount() || 0,
            activeEffects: engine?.getActiveEffects() || [],
            queue: effectQueue.length
          })
        };
      }
    })();
  </script>
</body>
</html>
